<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilar Misteri - Pilih Materi Presentasimu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { heading: ['Fredoka','sans-serif'], body: ['Nunito','sans-serif'] } } }
        }
    </script>
    <style>
        :root {
            --bg:#141210;--bg-light:#1e1b17;--surface:#28231c;--surface-light:#342e24;
            --text:#f5efe6;--text-muted:#a89b8c;--terracotta:#c4784a;--gold:#e8a838;--gold-light:#f0c060;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        
        /* Memusatkan container dan memberi background luar */
        body {
            font-family:'Nunito',sans-serif;
            background: #050403; /* Warna sangat gelap untuk background luar (desktop) */
            color:var(--text);
            min-height:100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Container App (Simulasi layar Tablet Landscape) */
        #app-container {
            position: relative;
            width: 100%;
            max-width: 900px; /* Lebar maksimal tablet landscape */
            height: 100vh;
            max-height: 650px; /* Rasio mendekati 3:2 (900x650) */
            background: var(--bg);
            overflow: hidden; /* Menahan semua elemen absolut agar tidak keluar box */
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 0 8px #1a1815;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
        }

        @media (max-width: 768px) {
            #app-container {
                max-width: 100%;
                max-height: none;
                border-radius: 0;
                box-shadow: none;
                border: none;
            }
        }

        .fullscreen-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .fullscreen-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .bg-glow{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
        .bg-glow-1{width:400px;height:400px;background:rgba(196,120,74,0.08);top:-100px;left:-100px;animation:gD 14s ease-in-out infinite alternate}
        .bg-glow-2{width:350px;height:350px;background:rgba(232,168,56,0.06);bottom:-50px;right:-50px;animation:gD 18s ease-in-out infinite alternate-reverse}
        @keyframes gD{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,30px) scale(1.1)}}
        
        .bg-p{position:absolute;border-radius:50%;pointer-events:none;z-index:0;opacity:0;animation:pF var(--d) ease-in-out infinite;animation-delay:var(--dl)}
        @keyframes pF{0%,100%{transform:translateY(0) translateX(0);opacity:.1}50%{transform:translateY(-20px) translateX(10px);opacity:.25}}
        #bg-particles { position: absolute; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

        .screen{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;transition:opacity .4s,transform .4s;overflow-y:auto; overflow-x:hidden;}
        .screen.hidden{opacity:0;pointer-events:none;transform:scale(.96)}

        .name-card{background:linear-gradient(160deg,var(--surface-light),var(--surface));border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:2rem 1.5rem;width:100%;max-width:360px;text-align:center;position:relative;overflow:hidden;box-shadow:0 15px 35px rgba(0,0,0,.4)}
        .name-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--terracotta),var(--gold),var(--gold-light))}
        .name-card h1{font-family:'Fredoka';font-size:clamp(1.6rem,7vw,2.2rem);font-weight:700;background:linear-gradient(135deg,var(--gold),var(--terracotta),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem;line-height:1.2}
        .name-card .sub{color:var(--text-muted);font-size:.85rem;margin-bottom:1.5rem;line-height:1.4}
        
        .name-input-wrap{position:relative;margin-bottom:.5rem}
        .name-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.9rem}
        .name-input{width:100%;padding:.8rem 1rem .8rem 2.4rem;border-radius:12px;border:2px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);color:var(--text);font-family:'Nunito';font-size:.95rem;font-weight:600;outline:none;transition:border-color .3s,box-shadow .3s}
        .name-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,168,56,.15)}
        .name-error{font-size:.75rem;color:#e8694a;min-height:1.2rem;margin-bottom:.3rem}

        .btn-gold{font-family:'Fredoka';font-size:1rem;font-weight:600;padding:.8rem 2rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold),#d49520);color:#1a1714;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(232,168,56,.3);width:100%}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(232,168,56,.4)}
        .btn-gold:active{transform:translateY(0) scale(.98)}

        .player-bar{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;padding:.5rem .8rem;border-radius:10px;background:var(--surface);border:1px solid rgba(255,255,255,.06);font-size:.8rem;width:95%;max-width:450px}
        .player-bar .pname{font-weight:700;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        
        .game-hdr{text-align:center;margin-bottom:1.5rem;width:100%}
        .game-hdr h2{font-family:'Fredoka';font-size:clamp(1.4rem,5vw,1.8rem);font-weight:600;line-height:1.2;margin-bottom:.5rem}
        
        .topic-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem 1rem;border-radius:12px;background:linear-gradient(135deg, rgba(232,168,56,0.1), rgba(196,120,74,0.1));border:1px solid rgba(232,168,56,0.2);font-size:.85rem;color:var(--text);font-weight:600}
        .topic-badge span{color:var(--gold);font-weight:800;font-size:.9rem}

        .table{background:linear-gradient(180deg,#3e3222 0%,#4a3c28 30%,#3a2e1e 65%,#4a3c28 100%);border-radius:24px;padding:2rem 1.5rem;border:2px solid #2a2015;box-shadow:0 10px 30px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);position:relative;width:90%;max-width:750px}
        .table::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent)}
        
        /* Grid untuk rasio Tablet (1 baris x 4 kolom) */
        .bowls-row{display:grid;grid-template-columns:repeat(4, 1fr);gap:1.5rem 1rem;justify-items:center}
        
        @media (max-width: 768px) {
            .bowls-row { grid-template-columns: repeat(2, 1fr); }
        }

        .bowl-slot{position:relative;display:flex;flex-direction:column;align-items:center;width:120px;height:170px;perspective:500px;opacity:0;transform:translateY(30px);animation:bI .5s ease forwards;transition:opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease;}
        .bowl-slot:nth-child(1){animation-delay:.1s}.bowl-slot:nth-child(2){animation-delay:.2s}.bowl-slot:nth-child(3){animation-delay:.3s}.bowl-slot:nth-child(4){animation-delay:.4s}
        @keyframes bI{to{opacity:1;transform:translateY(0)}}
        
        /* Redup saat mangkok lain dipilih */
        .bowl-slot.dimmed { opacity: 0.3; filter: grayscale(80%) blur(1px); pointer-events: none; transform: scale(0.95); }

        .bowl-slot::after{content:'';position:absolute;bottom:35px;width:80px;height:10px;background:radial-gradient(ellipse,rgba(0,0,0,.4) 0%,transparent 70%);border-radius:50%;z-index:1;transition:all .6s cubic-bezier(.34,1.56,.64,1)}
        .bowl-slot.lifted::after{transform:scale(1.5);opacity:.1}
        
        .bowl-content-area{position:absolute;bottom:40px;width:60px;height:50px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .3s ease .2s}
        .bowl-slot.revealed .bowl-content-area{opacity:1}
        
        .bowl-assembly{position:absolute;bottom:36px;width:105px;height:75px;z-index:10;cursor:pointer;transition:transform .6s cubic-bezier(.34,1.56,.64,1);transform-origin:center bottom}
        .bowl-slot:not(.revealed):not(.dimmed):not(.shuffling) .bowl-assembly:hover{animation:wob .5s ease}
        @keyframes wob{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}75%{transform:rotate(-3deg)}}
        
        .bowl-slot.lifted .bowl-assembly{transform:translateY(-85px) rotateX(-12deg)}
        .bowl-assembly.locked{cursor:default;pointer-events:none;}
        
        .bowl-body{width:100%;height:100%;border-radius:52px 52px 6px 6px;background:linear-gradient(155deg,#d4885c 0%,#c07040 25%,#a05830 50%,#8b4518 80%,#6b3410 100%);position:relative;box-shadow:inset 0 -10px 20px rgba(0,0,0,.35),inset 0 6px 12px rgba(255,220,180,.1),0 5px 12px rgba(0,0,0,.4)}
        .bowl-body::before{content:'';position:absolute;top:12%;left:18%;width:26%;height:36%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,240,210,.25),transparent 70%);transform:rotate(-15deg);pointer-events:none}
        .bowl-body::after{content:'';position:absolute;top:44%;left:8%;right:8%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(255,220,180,.12),transparent);pointer-events:none}
        .bowl-rim{position:absolute;bottom:-3px;left:-2px;right:-2px;height:7px;border-radius:50%;background:linear-gradient(to bottom,#c47a4e,#7a3c12);box-shadow:0 2px 4px rgba(0,0,0,.3)}
        
        .bowl-label{position:absolute;bottom:0;display:flex;align-items:center;gap:.3rem;padding:.2rem .6rem;border-radius:6px;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.05);z-index:15}
        .ltxt{font-family:'Fredoka';font-size:.7rem;font-weight:600;color:#e6dfd1}

        .bowl-slot.shuffling .bowl-assembly { animation: shuffleMove .3s ease-in-out; }
        .bowl-slot.shuffling:nth-child(1) .bowl-assembly { animation-delay: 0s; }
        .bowl-slot.shuffling:nth-child(2) .bowl-assembly { animation-delay: .05s; }
        .bowl-slot.shuffling:nth-child(3) .bowl-assembly { animation-delay: .1s; }
        .bowl-slot.shuffling:nth-child(4) .bowl-assembly { animation-delay: .15s; }
        @keyframes shuffleMove { 0%{transform:translateX(0)} 25%{transform:translateX(-8px) rotate(-3deg)} 50%{transform:translateX(8px) rotate(3deg)} 75%{transform:translateX(-5px) rotate(-2deg)} 100%{transform:translateX(0) rotate(0deg)} }

        .token-glow {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #fff;
            box-shadow: 0 0 20px var(--tk-color), inset 0 0 10px rgba(255,255,255,0.4);
            background: radial-gradient(circle, var(--tk-color) 30%, #111 100%);
            border: 2px solid rgba(255,255,255,0.7);
            animation: floatToken 2s ease-in-out infinite alternate;
        }
        @keyframes floatToken {
            0% { transform: translateY(5px); box-shadow: 0 0 10px var(--tk-color); }
            100% { transform: translateY(-5px); box-shadow: 0 0 25px var(--tk-color); }
        }

        .hint-text{text-align:center;margin-top:1.5rem;font-size:.8rem;color:var(--text-muted);animation:hP 2s ease-in-out infinite;width:90%}
        @keyframes hP{0%,100%{opacity:.5}50%{opacity:1}}

        .result-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(10,8,6,.92);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto;overflow-x:hidden;}
        .result-overlay.active{opacity:1;pointer-events:auto}
        
        .result-card{background:linear-gradient(160deg,var(--surface-light),var(--surface));border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:1.8rem 1.5rem;width:95%;max-width:750px;position:relative;transform:translateY(20px) scale(.95);transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:0 15px 40px rgba(0,0,0,0.6);margin:auto;}
        .result-overlay.active .result-card{transform:translateY(0) scale(1)}
        
        .r-player{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .8rem;border-radius:8px;background:rgba(0,0,0,.25);font-size:.85rem;color:var(--text-muted);margin-bottom:.8rem}
        .r-player strong{color:var(--gold)}
        .r-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.4rem 1rem;border-radius:10px;font-family:'Fredoka';font-size:.9rem;font-weight:600;margin-bottom:.6rem}
        .r-title{font-family:'Fredoka';font-size:1.6rem;font-weight:700;margin-bottom:.2rem;line-height:1.2}
        .r-subtitle{font-size:.9rem;color:var(--text);font-weight:600;margin-bottom:1rem;opacity:0.9;line-height:1.3}
        
        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:1rem 0}
        
        .outline-title{font-family:'Fredoka';font-size:1rem;font-weight:600;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
        
        .slides-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .slides-grid { grid-template-columns: 1fr; } }
        
        .slide-item{display:flex;gap:.8rem;align-items:flex-start;padding:.8rem;border-radius:12px;background:rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.04);transition:border-color .2s;height:100%}
        .slide-item:hover{border-color:rgba(255,255,255,.15)}
        .slide-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-size:.85rem;font-weight:700;flex-shrink:0;color:var(--bg)}
        .slide-info{flex:1;display:flex;flex-direction:column}
        .slide-name{font-weight:700;font-size:.9rem;margin-bottom:.3rem;color:var(--text)}
        .slide-detail{font-size:.8rem;color:var(--text-muted);line-height:1.5;flex:1}

        .tips-box{background:rgba(232,168,56,0.08);border:1px dashed rgba(232,168,56,0.3);border-radius:8px;padding:.8rem;margin-top:.8rem;font-size:.8rem;color:var(--text);line-height:1.4;display:flex;gap:.5rem;align-items:flex-start}
        .tips-icon{color:var(--gold);font-size:1rem;margin-top:.1rem;animation:hP 2s infinite}
        .tips-content strong{color:var(--gold);display:block;margin-bottom:.2rem;font-size:.85rem}

        .btn-next{font-family:'Fredoka';font-size:.95rem;font-weight:600;padding:.8rem 2rem;border:none;border-radius:12px;background:linear-gradient(135deg,#4ac47a,#2e9e5a);color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 15px rgba(74,196,122,.3);width:100%;margin-top:1.2rem}
        .btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(74,196,122,.4)}
        .btn-next:active{transform:translateY(0) scale(.98)}

        .confetti-piece{position:absolute;z-index:200;pointer-events:none;opacity:0}
        .toast{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-light);border:1px solid rgba(255,255,255,.08);color:var(--text);padding:.6rem 1.2rem;border-radius:10px;font-size:.8rem;font-weight:600;z-index:300;opacity:0;transition:all .4s;pointer-events:none;box-shadow:0 8px 25px rgba(0,0,0,.4);white-space:nowrap}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        /* Scrollbar custom for app container */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    
    <div id="app-container">
        
        <div class="fullscreen-btn" onclick="toggleFullScreen()" title="Layar Penuh" id="fs-btn">
            <i class="fa-solid fa-expand"></i>
        </div>

        <div class="bg-glow bg-glow-1"></div>
        <div class="bg-glow bg-glow-2"></div>
        <div id="bg-particles"></div>

        <!-- LAYAR NAMA -->
        <div id="name-screen" class="screen">
            <div class="name-card">
                <div style="font-size:2rem;margin-bottom:.5rem;opacity:.8">
                    <i class="fa-solid fa-bowl-food" style="color:var(--terracotta)"></i>
                </div>
                <h1>Pilar Misteri</h1>
                <p class="sub">Pilih Pilarmu & dapatkan materi presentasi!</p>

                <div class="name-input-wrap">
                    <i class="fa-solid fa-users"></i>
                    <input type="text" class="name-input" id="name-input" placeholder="Ketik nama kelompok..." maxlength="40" autocomplete="off">
                </div>
                <div class="name-error" id="name-error"></div>
                <button class="btn-gold" onclick="submitName()">
                    <i class="fa-solid fa-play" style="margin-right:.4rem"></i> Mulai Main
                </button>
            </div>
        </div>

        <!-- LAYAR PERMAINAN -->
        <div id="game-screen" class="screen hidden">
            <div class="player-bar">
                <i class="fa-solid fa-users" style="color:var(--gold);font-size:.8rem"></i>
                <span class="pname" id="display-name"></span>
            </div>
            
            <header class="game-hdr">
                <h2>Pilih Satu Mangkok</h2>
                <div class="topic-badge">
                    <i class="fa-solid fa-layer-group" style="color:var(--gold)"></i> 
                    Topik Tersisa: <span id="topic-counter">16/16</span>
                </div>
            </header>
            
            <div class="table">
                <div class="bowls-row" id="bowls-row"></div>
            </div>
            
            <p class="hint-text" id="hint-text">
                <i class="fa-solid fa-arrow-pointer" style="margin-right:.3rem"></i> Klik mangkok untuk mengungkap isinya
            </p>
        </div>

        <!-- LAYAR HASIL PRESENTASI -->
        <div class="result-overlay" id="result-overlay">
            <div class="result-card" id="result-card">
                <div class="r-player" id="r-player"></div>
                <div class="r-badge" id="r-badge"></div>
                <h2 class="r-title" id="r-title"></h2>
                <p class="r-subtitle" id="r-subtitle"></p>
                
                <div class="divider"></div>
                
                <div class="outline-title">
                    <i class="fa-solid fa-file-powerpoint" style="color:var(--gold)"></i>
                    Kerangka Presentasi (4 Slide)
                </div>
                <!-- Konten dinamis sesuai 4 konsep baru -->
                <div id="slides-outline"></div>
                
                <button class="btn-next" onclick="nextStudent()">
                    <i class="fa-solid fa-check" style="margin-right:.4rem"></i> Siap Mengerjakan!
                </button>
            </div>
        </div>

        <div class="toast" id="toast"></div>

    </div> <!-- End of app-container -->

    <script>
        
        // --- DATA PILAR YANG DIPERBARUI (Tanpa Definisi Jawaban Langsung) ---
        const pillarDefs = {
            'dekomposisi': { 
                id: 'dekomposisi', name:'Dekomposisi', icon:'fa-puzzle-piece', color:'#e8694a',
                tip: 'Pikirkan satu hal yang terasa repot atau berat. Lalu, pecah tugas utama tersebut menjadi 3-4 bagian kecil yang terpisah.'
            },
            'pengenalan-pola': { 
                id: 'pengenalan-pola', name:'Pengenalan Pola', icon:'fa-eye', color:'#4a9ee8',
                tip: 'Ingat-ingat kejadian di sekitarmu yang sering berulang. "Setiap kali [A] terjadi, biasanya [B] akan menyusul." Gunakan itu sebagai panduan!'
            },
            'abstraksi': { 
                id: 'abstraksi', name:'Abstraksi', icon:'fa-filter', color:'#4ac47a',
                tip: 'Fokus pada hal yang paling PENTING saja. Abaikan detail pelengkap seperti warna, lokasi, atau hiasan yang tidak mengubah fungsi utamanya.'
            },
            'algoritma': { 
                id: 'algoritma', name:'Desain Algoritma', icon:'fa-list-ol', color:'#e8c84a',
                tip: 'Bayangkan kamu memberi instruksi kepada robot yang tidak tahu apa-apa. Buatlah langkah demi langkah dari nomor 1 sampai akhir dengan jelas.'
            }
        };

        // 16 Topik Unik yang tersedia untuk ditarik
        const allTopics = [
            { id: 1, pillarId: 'dekomposisi', title: 'Acara Ulang Tahun Kelas' },
            { id: 2, pillarId: 'dekomposisi', title: 'Membangun Taman Sekolah' },
            { id: 3, pillarId: 'dekomposisi', title: 'Persiapan Bazaar Sekolah' },
            { id: 4, pillarId: 'dekomposisi', title: 'Pembuatan Mading Kelas' },
            
            { id: 5, pillarId: 'pengenalan-pola', title: 'Pola Cuaca & Bawaan Sekolah' },
            { id: 6, pillarId: 'pengenalan-pola', title: 'Tren Jajanan Favorit Kantin' },
            { id: 7, pillarId: 'pengenalan-pola', title: 'Jam Kemacetan Menuju Sekolah' },
            { id: 8, pillarId: 'pengenalan-pola', title: 'Kebiasaan Baterai Smartphone Habis' },

            { id: 9, pillarId: 'abstraksi', title: 'Membuat Peta Gerbang ke Kelas' },
            { id: 10, pillarId: 'abstraksi', title: 'Merangkum Buku Sejarah Tebal' },
            { id: 11, pillarId: 'abstraksi', title: 'Menulis Resep Masak Sederhana' },
            { id: 12, pillarId: 'abstraksi', title: 'Desain Ikon Aplikasi Sekolah' },

            { id: 13, pillarId: 'algoritma', title: 'Langkah Aman Menyeberang Jalan' },
            { id: 14, pillarId: 'algoritma', title: 'Sistem Antri Membeli Makanan' },
            { id: 15, pillarId: 'algoritma', title: 'Cara Cepat Merapikan Tas Sekolah' },
            { id: 16, pillarId: 'algoritma', title: 'Prosedur Meminjam Buku Perpus' }
        ];

        let availableTopics = [...allTopics];
        let playerName = '';
        let currentRoundPillars = [];
        let S = { busy:false };

        function init() {
            makeParticles();
            const inp = document.getElementById('name-input');
            inp.addEventListener('keydown', e => { if(e.key==='Enter') submitName(); });
            inp.addEventListener('input', function() {
                document.getElementById('name-error').textContent = '';
                this.style.borderColor = '';
            });
            // Auto focus if it's likely a desktop (to avoid mobile keyboard popups)
            if(window.innerWidth > 500) { setTimeout(() => inp.focus(), 500); }
        }

        function toggleFullScreen() {
            // Kita fullscreen dokumennya, agar #app-container tetap berada di tengah layar
            const doc = window.document;
            const docEl = doc.documentElement;
            const icon = document.querySelector('#fs-btn i');

            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if(!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                if(requestFullScreen) {
                    requestFullScreen.call(docEl);
                    icon.classList.remove('fa-expand');
                    icon.classList.add('fa-compress');
                }
            } else {
                if(cancelFullScreen) {
                    cancelFullScreen.call(doc);
                    icon.classList.remove('fa-compress');
                    icon.classList.add('fa-expand');
                }
            }
        }

        function makeParticles() {
            const c = document.getElementById('bg-particles');
            let h = '';
            for(let i=0;i<12;i++){ // Sedikit dikurangi untuk area 9:16
                const sz=Math.random()*4+2,x=Math.random()*100,y=Math.random()*100;
                const dur=Math.random()*6+5,del=Math.random()*5;
                const col=Math.random()>.5?'rgba(232,168,56,0.15)':'rgba(196,120,74,0.1)';
                h+=`<div class="bg-p" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;background:${col};--d:${dur}s;--dl:${del}s"></div>`;
            }
            c.innerHTML=h;
        }

        function updateCounterDisplay() {
            document.getElementById('topic-counter').textContent = `${availableTopics.length}/${allTopics.length}`;
        }

        function submitName() {
            if(availableTopics.length === 0) {
                toast('Semua topik sudah habis! Refresh untuk ulang.', '#e8694a');
                return;
            }

            const inp = document.getElementById('name-input');
            const err = document.getElementById('name-error');
            const val = inp.value.trim();

            if(!val) {
                err.textContent = 'Silakan masukkan nama kelompok!';
                inp.style.borderColor = '#e8694a';
                inp.focus();
                return;
            }

            err.textContent = '';
            inp.style.borderColor = '';
            playerName = val;
            inp.blur(); // Hide keyboard on mobile
            startGame();
        }

        function startGame() {
            S.busy = true;
            document.getElementById('display-name').textContent = playerName;
            updateCounterDisplay();
            
            // Siapkan 4 pilar acak untuk mengisi 4 mangkok. Jika sisa topik tinggal sedikit, kita acak dari topik yang tersisa saja
            let remainingPillarIds = [...new Set(availableTopics.map(t => t.pillarId))];
            
            // Pastikan kita memiliki 4 pilar untuk 4 mangkok. Jika sisa pilar < 4, penuhi dengan dummy/pilar lain agar tampilan tetap 4 mangkok
            let pillarsToPlace = [];
            while(pillarsToPlace.length < 4) {
                // Ambil pilar unik jika masih ada
                if(remainingPillarIds.length > 0) {
                    const rIdx = Math.floor(Math.random() * remainingPillarIds.length);
                    pillarsToPlace.push(pillarDefs[remainingPillarIds[rIdx]]);
                    remainingPillarIds.splice(rIdx, 1);
                } else {
                    // Jika kurang, tambahkan pilar acak dari semua definisi (walau mungkin topiknya habis)
                    const allKeys = Object.keys(pillarDefs);
                    pillarsToPlace.push(pillarDefs[allKeys[Math.floor(Math.random() * allKeys.length)]]);
                }
            }

            currentRoundPillars = pillarsToPlace.sort(() => 0.5 - Math.random());
            
            renderBowls();
            switchTo('game-screen');

            document.getElementById('hint-text').innerHTML = '<i class="fa-solid fa-shuffle" style="margin-right:.3rem;color:var(--gold)"></i> Mengacak posisi mangkok...';
            
            const slots = document.querySelectorAll('.bowl-slot');
            slots.forEach(s => s.classList.add('shuffling'));

            setTimeout(() => {
                slots.forEach(s => s.classList.remove('shuffling'));
                document.getElementById('hint-text').innerHTML = '<i class="fa-solid fa-arrow-pointer" style="margin-right:.3rem"></i> Klik salah satu mangkok untuk mengungkap isinya';
                S.busy = false; 
            }, 1200);
        }

        function renderBowls() {
            const row = document.getElementById('bowls-row');
            row.innerHTML = currentRoundPillars.map((p, i) => `
                <div class="bowl-slot" id="bs${i}">
                    <div class="bowl-content-area" id="bc${i}">
                        <div class="token-glow" style="--tk-color: ${p.color}">
                            <i class="fa-solid ${p.icon}"></i>
                        </div>
                    </div>
                    <div class="bowl-assembly" id="ba${i}" onclick="clickBowl(${i})" role="button" aria-label="Pilih mangkok ${i+1}" tabindex="0">
                        <div class="bowl-body"></div>
                        <div class="bowl-rim"></div>
                    </div>
                    <div class="bowl-label">
                        <i class="fa-solid fa-circle-question" style="color:var(--gold)"></i>
                        <span class="ltxt">Mangkok ${i+1}</span>
                    </div>
                </div>
            `).join('');
        }

        function clickBowl(idx) {
            if(S.busy) return;
            const slot = document.getElementById(`bs${idx}`);
            if(slot.classList.contains('dimmed') || slot.classList.contains('shuffling') || slot.classList.contains('revealed')) return;

            S.busy = true;
            const p = currentRoundPillars[idx];

            // Cek apakah ada topik tersedia untuk pilar ini
            const availableForPillar = availableTopics.filter(t => t.pillarId === p.id);
            
            if(availableForPillar.length === 0) {
                // Jika zonk (topik untuk pilar ini sudah habis)
                toast('Materi pilar ini sudah habis, coba pilih mangkok lain!', '#e8694a');
                document.getElementById(`ba${idx}`).classList.add('locked');
                slot.classList.add('dimmed');
                S.busy = false;
                return;
            }

            // Meredupkan mangkok yang tidak dipilih
            for(let i=0; i<4; i++) {
                if(i !== idx) document.getElementById(`bs${i}`).classList.add('dimmed');
            }

            slot.classList.add('lifted', 'revealed');

            // Mengambil 1 topik secara acak dari yang tersedia untuk pilar ini
            const rIdx = Math.floor(Math.random() * availableForPillar.length);
            const selectedTopic = availableForPillar[rIdx];
            
            // Menghapus topik terpilih dari daftar utama
            const mainIdx = availableTopics.findIndex(t => t.id === selectedTopic.id);
            availableTopics.splice(mainIdx, 1);

            setTimeout(() => {
                showResult(p, selectedTopic);
            }, 700);
        }

        function showResult(p, t) {
            document.getElementById('r-player').innerHTML = `<i class="fa-solid fa-user" style="font-size:.7rem"></i> <strong>${playerName}</strong>`;
            document.getElementById('r-badge').innerHTML = `<i class="fa-solid ${p.icon}"></i> Pilar: ${p.name}`;
            document.getElementById('r-badge').style.cssText = `background:${p.color}15;color:${p.color};border:1px solid ${p.color}30`;
            
            document.getElementById('r-title').textContent = t.title;
            document.getElementById('r-title').style.color = p.color;
            document.getElementById('r-subtitle').textContent = `Fokus Materi: Konsep ${p.name}`;
            
            // MEMBUAT SLIDES SECARA DINAMIS (Instruksi pencarian, bukan jawaban)
            const slidesHTML = `
                <div class="slides-grid">
                    <div class="slide-item">
                        <div class="slide-num" style="background:${p.color}">1</div>
                        <div class="slide-info">
                            <div class="slide-name">Penjelasan Materi</div>
                            <div class="slide-detail">Berikan penjelasan tentang pengertian pilar <strong>${p.name}</strong> yang sudah diambil menggunakan bahasa dan pemahaman kelompok kalian sendiri.</div>
                        </div>
                    </div>
                    <div class="slide-item">
                        <div class="slide-num" style="background:${p.color}">2</div>
                        <div class="slide-info">
                            <div class="slide-name">Analisis Perbedaan</div>
                            <div class="slide-detail">Jelaskan apa yang membuat konsep <strong>${p.name}</strong> ini berbeda dari pilar-pilar Berpikir Komputasional lainnya (sebutkan ciri khas utamanya).</div>
                        </div>
                    </div>
                    <div class="slide-item">
                        <div class="slide-num" style="background:${p.color}">3</div>
                        <div class="slide-info">
                            <div class="slide-name">Contoh Penerapan</div>
                            <div class="slide-detail">Buatlah rancangan penerapan dari pilar <strong>${p.name}</strong> untuk menyelesaikan/mengerjakan topik permasalahan: <br><strong style="color:var(--text);font-size:.85rem">"${t.title}"</strong>.</div>
                            <div class="tips-box">
                                <div class="tips-icon"><i class="fa-solid fa-lightbulb"></i></div>
                                <div class="tips-content">
                                    <strong>Tips Pengerjaan:</strong>
                                    ${p.tip}
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="slide-item">
                        <div class="slide-num" style="background:${p.color}">4</div>
                        <div class="slide-info">
                            <div class="slide-name">Manfaat & Kesimpulan</div>
                            <div class="slide-detail">Sebutkan minimal 2 keuntungan/manfaat jika kita menerapkan pendekatan ini saat menghadapi masalah tersebut di dunia nyata.</div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('slides-outline').innerHTML = slidesHTML;
            document.getElementById('result-card').style.borderTop = `4px solid ${p.color}`;
            
            document.getElementById('result-overlay').classList.add('active');
            confetti(p.color);
        }

        function nextStudent() {
            document.getElementById('result-overlay').classList.remove('active');
            const inp = document.getElementById('name-input');
            inp.value = '';
            playerName = '';
            
            if(availableTopics.length === 0) {
                toast('Semua topik telah berhasil diambil!', '#4ac47a');
                document.querySelector('.sub').innerHTML = '<strong style="color:var(--gold)">Selesai!</strong> Tidak ada topik tersisa.';
            }
            
            setTimeout(() => {
                switchTo('name-screen');
                if(window.innerWidth > 500 && availableTopics.length > 0) { setTimeout(() => inp.focus(), 400); }
            }, 400);
        }

        function switchTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            setTimeout(() => document.getElementById(id).classList.remove('hidden'), 80);
        }

        function toast(msg, col) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.borderLeft = `4px solid ${col||'var(--gold)'}`;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function confetti(pillarColor) {
            const cols = [pillarColor, pillarColor, '#f5efe6', '#e8a838']; 
            const container = document.getElementById('app-container'); // Confetti hanya jatuh di dalam container app
            
            for(let i=0;i<50;i++){
                const el = document.createElement('div'); el.className = 'confetti-piece';
                const sz = Math.random()*6+4, x = Math.random()*100;
                const c = cols[Math.floor(Math.random()*cols.length)];
                const dur = Math.random()*2+1.5, del = Math.random()*.3;
                const rot = Math.random()*1080-540, drift = (Math.random()-.5)*200;
                const br = Math.random()>.4 ? '50%' : '2px';
                
                el.style.cssText = `left:${x}%;width:${sz}px;height:${sz*.7}px;background:${c};border-radius:${br};box-shadow:0 0 4px ${c}60`;
                el.animate([
                    {transform:'translateX(0) translateY(-20px) rotate(0deg) scale(1)',opacity:1},
                    {transform:`translateX(${drift}px) translateY(${container.offsetHeight}px) rotate(${rot}deg) scale(.6)`,opacity:0}
                ],{duration:dur*1000,delay:del*1000,easing:'cubic-bezier(.25,.46,.45,.94)',fill:'forwards'});
                
                container.appendChild(el);
                setTimeout(() => el.remove(), (dur+del)*1000+50);
            }
        }

        init();
    </script>
</body>
</html>
