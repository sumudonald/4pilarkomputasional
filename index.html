<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mangkok Misteri - Pilih Materi Presentasimu</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { heading: ['Fredoka','sans-serif'], body: ['Nunito','sans-serif'] } } }
        }
    </script>
    <style>
        :root {
            --bg:#141210;--bg-light:#1e1b17;--surface:#28231c;--surface-light:#342e24;
            --text:#f5efe6;--text-muted:#a89b8c;--terracotta:#c4784a;--gold:#e8a838;--gold-light:#f0c060;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        .bg-glow{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0}
        .bg-glow-1{width:500px;height:500px;background:rgba(196,120,74,0.07);top:-150px;left:-100px;animation:gD 14s ease-in-out infinite alternate}
        .bg-glow-2{width:400px;height:400px;background:rgba(232,168,56,0.05);bottom:-100px;right:-80px;animation:gD 18s ease-in-out infinite alternate-reverse}
        @keyframes gD{0%{transform:translate(0,0) scale(1)}100%{transform:translate(50px,35px) scale(1.2)}}
        .bg-p{position:fixed;border-radius:50%;pointer-events:none;z-index:0;opacity:0;animation:pF var(--d) ease-in-out infinite;animation-delay:var(--dl)}
        @keyframes pF{0%,100%{transform:translateY(0) translateX(0);opacity:.12}50%{transform:translateY(-30px) translateX(15px);opacity:.32}}

        .screen{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;transition:opacity .5s,transform .5s}
        .screen.hidden{opacity:0;pointer-events:none;position:absolute;top:0;left:0;right:0;transform:scale(.96)}

        .name-card{background:linear-gradient(160deg,var(--surface-light),var(--surface));border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;position:relative;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.4)}
        .name-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--terracotta),var(--gold),var(--gold-light))}
        .name-card h1{font-family:'Fredoka';font-size:clamp(1.8rem,5vw,2.4rem);font-weight:700;background:linear-gradient(135deg,var(--gold),var(--terracotta),var(--gold-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
        .name-card .sub{color:var(--text-muted);font-size:.9rem;margin-bottom:1.8rem}
        
        .name-input-wrap{position:relative;margin-bottom:.5rem}
        .name-input-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.9rem}
        .name-input{width:100%;padding:.85rem 1rem .85rem 2.6rem;border-radius:14px;border:2px solid rgba(255,255,255,.08);background:rgba(0,0,0,.25);color:var(--text);font-family:'Nunito';font-size:1rem;font-weight:600;outline:none;transition:border-color .3s,box-shadow .3s}
        .name-input::placeholder{color:var(--text-muted);font-weight:400}
        .name-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,168,56,.15)}
        .name-error{font-size:.8rem;color:#e8694a;min-height:1.4rem;margin-bottom:.3rem;transition:opacity .3s}

        .btn-gold{font-family:'Fredoka';font-size:1.05rem;font-weight:600;padding:.8rem 2.2rem;border:none;border-radius:14px;background:linear-gradient(135deg,var(--gold),#d49520);color:#1a1714;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(232,168,56,.3);width:100%}
        .btn-gold:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(232,168,56,.45)}
        .btn-gold:active{transform:translateY(0) scale(.98)}
        .btn-gold:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}

        .player-bar{display:flex;align-items:center;gap:.6rem;margin-bottom:.8rem;padding:.45rem 1rem;border-radius:12px;background:var(--surface);border:1px solid rgba(255,255,255,.06);font-size:.85rem;box-shadow:0 4px 15px rgba(0,0,0,.2)}
        .player-bar .pname{font-weight:700;color:var(--gold)}
        .game-hdr{text-align:center;margin-bottom:1rem}
        .game-hdr h2{font-family:'Fredoka';font-size:clamp(1.2rem,3.5vw,1.6rem);font-weight:600}
        
        .topic-badge{display:inline-flex;align-items:center;gap:.35rem;margin-top:.4rem;padding:.3rem .9rem;border-radius:16px;background:linear-gradient(135deg, rgba(232,168,56,0.1), rgba(196,120,74,0.1));border:1px solid rgba(232,168,56,0.2);font-size:.8rem;color:var(--text);font-weight:600}
        .topic-badge span{color:var(--gold);font-weight:800;font-size:.9rem}

        .table{background:linear-gradient(180deg,#3e3222 0%,#4a3c28 30%,#3a2e1e 65%,#4a3c28 100%);border-radius:22px;padding:2.2rem 1.5rem 1.8rem;border:2px solid #2a2015;box-shadow:0 12px 50px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);position:relative}
        .table::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent)}
        .bowls-row{display:flex;justify-content:center;align-items:flex-end;gap:clamp(.6rem,2.5vw,1.8rem);flex-wrap:wrap}

        .bowl-slot.shuffling .bowl-assembly { animation: shuffleMove .35s ease-in-out; }
        .bowl-slot.shuffling:nth-child(1) .bowl-assembly { animation-delay: 0s; }
        .bowl-slot.shuffling:nth-child(2) .bowl-assembly { animation-delay: .06s; }
        .bowl-slot.shuffling:nth-child(3) .bowl-assembly { animation-delay: .12s; }
        .bowl-slot.shuffling:nth-child(4) .bowl-assembly { animation-delay: .18s; }
        @keyframes shuffleMove {
            0%  { transform: translateX(0); }
            25% { transform: translateX(-12px) rotate(-4deg); }
            50% { transform: translateX(10px) rotate(3deg); }
            75% { transform: translateX(-6px) rotate(-2deg); }
            100%{ transform: translateX(0) rotate(0deg); }
        }

        .bowl-slot{position:relative;display:flex;flex-direction:column;align-items:center;width:clamp(115px,19vw,155px);height:195px;perspective:600px;opacity:0;transform:translateY(40px);animation:bI .6s ease forwards;transition:opacity 0.4s ease, filter 0.4s ease, transform 0.4s ease;}
        .bowl-slot:nth-child(1){animation-delay:.12s}.bowl-slot:nth-child(2){animation-delay:.24s}.bowl-slot:nth-child(3){animation-delay:.36s}.bowl-slot:nth-child(4){animation-delay:.48s}
        @keyframes bI{to{opacity:1;transform:translateY(0)}}
        
        .bowl-slot.dimmed { opacity: 0.35; filter: grayscale(80%) blur(1px); pointer-events: none; transform: scale(0.95) translateY(0); }

        .bowl-slot::after{content:'';position:absolute;bottom:42px;width:95px;height:13px;background:radial-gradient(ellipse,rgba(0,0,0,.4) 0%,transparent 70%);border-radius:50%;z-index:1;transition:all .7s cubic-bezier(.34,1.56,.64,1)}
        .bowl-slot.lifted::after{transform:scale(1.7);opacity:.12}
        
        .bowl-content-area{position:absolute;bottom:48px;width:75px;height:60px;display:flex;align-items:center;justify-content:center;z-index:2;opacity:0;transition:opacity .4s ease .2s}
        .bowl-slot.revealed .bowl-content-area{opacity:1}
        
        .bowl-assembly{position:absolute;bottom:44px;width:125px;height:90px;z-index:10;cursor:pointer;transition:transform .7s cubic-bezier(.34,1.56,.64,1);transform-origin:center bottom}
        .bowl-slot:not(.revealed):not(.dimmed):not(.shuffling) .bowl-assembly:hover{animation:wob .6s ease}
        @keyframes wob{0%,100%{transform:rotate(0)}20%{transform:rotate(-3deg)}40%{transform:rotate(3deg)}60%{transform:rotate(-2deg)}80%{transform:rotate(2deg)}}
        .bowl-slot.lifted .bowl-assembly{transform:translateY(-100px) rotateX(-12deg)}
        .bowl-assembly.locked{cursor:default}
        
        .bowl-body{width:100%;height:100%;border-radius:63px 63px 7px 7px;background:linear-gradient(155deg,#d4885c 0%,#c07040 25%,#a05830 50%,#8b4518 80%,#6b3410 100%);position:relative;box-shadow:inset 0 -12px 25px rgba(0,0,0,.35),inset 0 8px 15px rgba(255,220,180,.1),0 6px 15px rgba(0,0,0,.4)}
        .bowl-body::before{content:'';position:absolute;top:12%;left:18%;width:26%;height:36%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,240,210,.25),transparent 70%);transform:rotate(-15deg);pointer-events:none}
        .bowl-body::after{content:'';position:absolute;top:44%;left:8%;right:8%;height:1.5px;background:linear-gradient(90deg,transparent,rgba(255,220,180,.12),transparent);pointer-events:none}
        .bowl-rim{position:absolute;bottom:-4px;left:-3px;right:-3px;height:9px;border-radius:50%;background:linear-gradient(to bottom,#c47a4e,#7a3c12);box-shadow:0 2px 5px rgba(0,0,0,.3)}
        
        .bowl-label{position:absolute;bottom:0;display:flex;align-items:center;gap:.4rem;padding:.3rem .75rem;border-radius:8px;background:linear-gradient(to bottom, #3a3227, #221c15);border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 10px rgba(0,0,0,0.5);z-index:15;color:#d8cfc0;}
        .ltxt{font-family:'Fredoka';font-size:.75rem;font-weight:600}

        .token-glow {
            width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff; box-shadow: 0 0 25px var(--tk-color), inset 0 0 15px rgba(255,255,255,0.4);
            background: radial-gradient(circle, var(--tk-color) 30%, #111 100%); border: 2px solid rgba(255,255,255,0.7);
            transform: translateY(10px); animation: floatToken 2s ease-in-out infinite alternate;
        }
        @keyframes floatToken {
            0% { transform: translateY(10px); box-shadow: 0 0 15px var(--tk-color), inset 0 0 10px rgba(255,255,255,0.3); }
            100% { transform: translateY(-5px); box-shadow: 0 0 35px var(--tk-color), inset 0 0 20px rgba(255,255,255,0.6); }
        }

        .hint-text{text-align:center;margin-top:1rem;font-size:.85rem;color:var(--text-muted);animation:hP 2s ease-in-out infinite}
        @keyframes hP{0%,100%{opacity:.6}50%{opacity:1}}

        .result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(10,8,6,.88);backdrop-filter:blur(10px);z-index:100;display:flex;align-items:center;justify-content:center;padding:1.2rem;opacity:0;pointer-events:none;transition:opacity .4s;overflow-y:auto}
        .result-overlay.active{opacity:1;pointer-events:auto}
        .result-card{background:linear-gradient(160deg,var(--surface-light),var(--surface));border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:2rem;max-width:550px;width:100%;position:relative;transform:translateY(30px) scale(.95);transition:transform .5s cubic-bezier(.34,1.56,.64,1);box-shadow:0 25px 50px rgba(0,0,0,0.6)}
        .result-overlay.active .result-card{transform:translateY(0) scale(1)}
        
        .r-player{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:8px;background:rgba(0,0,0,.3);font-size:.8rem;color:var(--text-muted);margin-bottom:.8rem}
        .r-player strong{color:var(--gold)}
        .r-badge{display:inline-flex;align-items:center;gap:.45rem;padding:.4rem 1rem;border-radius:10px;font-family:'Fredoka';font-size:.85rem;font-weight:600;margin-bottom:.8rem;box-shadow:0 4px 15px rgba(0,0,0,0.2)}
        .r-title{font-family:'Fredoka';font-size:1.6rem;font-weight:700;margin-bottom:.3rem}
        .r-subtitle{font-size:.95rem;color:var(--text);font-weight:600;margin-bottom:1.2rem;opacity:0.9}
        
        .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);margin:1.2rem 0}
        .outline-title{font-family:'Fredoka';font-size:1.05rem;font-weight:600;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem}
        
        .slide-item{display:flex;gap:.8rem;align-items:flex-start;padding:.7rem .85rem;border-radius:12px;margin-bottom:.5rem;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.05);transition:border-color .2s;flex-direction:column}
        .slide-item:hover{border-color:rgba(255,255,255,.15)}
        .slide-item-header { display: flex; gap: .8rem; align-items: flex-start; width: 100%; }
        .slide-num{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Fredoka';font-size:.8rem;font-weight:700;flex-shrink:0;color:var(--bg)}
        .slide-info{flex:1}
        .slide-name{font-weight:700;font-size:.85rem;margin-bottom:.2rem;color:var(--text)}
        .slide-detail{font-size:.8rem;color:var(--text-muted);line-height:1.5}
        
        /* STYLE TAMBAHAN UNTUK FITUR TIPS */
        .slide-tip {
            margin-top: .6rem;
            margin-left: 2.5rem; /* Menyesuaikan dengan lebar nomor slide */
            padding: .5rem .75rem;
            background: rgba(232,168,56,0.12);
            border-left: 3px solid var(--gold);
            border-radius: 6px;
            font-size: .8rem;
            color: #ebd197;
            line-height: 1.4;
            display: flex;
            gap: .5rem;
            align-items: flex-start;
        }
        .slide-tip i { color: var(--gold); margin-top: .15rem; font-size: .9rem; }
        
        .btn-next{font-family:'Fredoka';font-size:1.1rem;font-weight:600;padding:.85rem 2.2rem;border:none;border-radius:14px;background:linear-gradient(135deg,#4ac47a,#2e9e5a);color:#fff;cursor:pointer;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(74,196,122,.3);width:100%;margin-top:1.5rem}
        .btn-next:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(74,196,122,.45)}
        .btn-next:active{transform:translateY(0) scale(.98)}

        .confetti-piece{position:fixed;z-index:200;pointer-events:none;opacity:0}
        .toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface-light);border:1px solid rgba(255,255,255,.15);color:var(--text);padding:.75rem 1.6rem;border-radius:14px;font-size:.9rem;font-weight:600;z-index:300;opacity:0;transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 10px 40px rgba(0,0,0,.6)}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        @media(max-width:560px){
            .bowl-slot{width:108px;height:175px}.bowl-assembly{width:108px;height:78px}.bowl-body{border-radius:54px 54px 6px 6px}
            .bowl-slot.lifted .bowl-assembly{transform:translateY(-82px) rotateX(-10deg)}
            .table{padding:1.4rem .6rem 1rem;border-radius:16px}.result-card{padding:1.5rem}
            .name-card{padding:2rem 1.5rem}
            .token-glow { width: 40px; height: 40px; font-size: 1.2rem; }
            .slide-tip { margin-left: 0; margin-top: .8rem; }
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>
    <div id="bg-particles"></div>

    <div id="name-screen" class="screen">
        <div class="name-card">
            <div style="font-size:2.2rem;margin-bottom:.5rem;opacity:.8">
                <i class="fa-solid fa-bowl-food" style="color:var(--terracotta)"></i>
            </div>
            <h1>Mangkok Misteri</h1>
            <p class="sub">Pilih mangkokmu, dapatkan materi, buat presentasinya!</p>

            <div class="name-input-wrap">
                <i class="fa-solid fa-users"></i>
                <input type="text" class="name-input" id="name-input" placeholder="Ketik nama kelompok/siswa..." maxlength="40" autocomplete="off">
            </div>
            <div class="name-error" id="name-error"></div>
            <button class="btn-gold" onclick="submitName()">
                <i class="fa-solid fa-play" style="margin-right:.4rem"></i> Mulai Bermain
            </button>
        </div>
    </div>

    <div id="game-screen" class="screen hidden">
        <div class="player-bar">
            <i class="fa-solid fa-users" style="color:var(--gold);font-size:.8rem"></i>
            <span class="pname" id="display-name"></span>
        </div>
        
        <header class="game-hdr">
            <h2>Pilih Satu Mangkok Misteri</h2>
            <div class="topic-badge">
                <i class="fa-solid fa-layer-group" style="color:var(--gold)"></i> 
                Topik Tersisa: <span id="topic-counter">16/16</span>
            </div>
        </header>
        
        <div class="table">
            <div class="bowls-row" id="bowls-row"></div>
        </div>
        
        <p class="hint-text" id="hint-text">
            <i class="fa-solid fa-arrow-pointer" style="margin-right:.3rem"></i> Klik salah satu mangkok untuk mengungkap isinya
        </p>
    </div>

    <div class="result-overlay" id="result-overlay">
        <div class="result-card" id="result-card">
            <div class="r-player" id="r-player"></div>
            <div class="r-badge" id="r-badge"></div>
            <h2 class="r-title" id="r-title"></h2>
            <p class="r-subtitle" id="r-subtitle"></p>
            
            <div class="divider"></div>
            
            <div class="outline-title">
                <i class="fa-solid fa-file-powerpoint" style="color:var(--gold)"></i>
                Kerangka Presentasi (4 Slide)
            </div>
            <div id="slides-outline"></div>
            
            <button class="btn-next" onclick="nextStudent()">
                <i class="fa-solid fa-check" style="margin-right:.4rem"></i> Siap Mengerjakan!
            </button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const pillarDefs = {
            'dekomposisi': { name:'Dekomposisi', icon:'fa-puzzle-piece', color:'#e8694a' },
            'pengenalan-pola': { name:'Pengenalan Pola', icon:'fa-eye', color:'#4a9ee8' },
            'abstraksi': { name:'Abstraksi', icon:'fa-filter', color:'#4ac47a' },
            'algoritma': { name:'Desain Algoritma', icon:'fa-list-ol', color:'#e8c84a' }
        };

        // 16 Topik Unik dengan tambahan "tips" pada slide ke-3 (Buat Contoh Sendiri)
        const allTopics = [
            // --- DEKOMPOSISI ---
            { id: 1, pillarId: 'dekomposisi', title: 'Acara Ulang Tahun Kelas',
              slides: [
                  {name:'Pembahasan Pilar', detail:'Jelaskan konsep Dekomposisi: Memecah masalah/proyek besar menjadi tugas-tugas kecil yang lebih mudah dikerjakan.'},
                  {name:'Contoh Kehidupan Nyata', detail:'Merencanakan ultah kelas dengan membaginya menjadi divisi: Konsumsi, Dekorasi, dan Susunan Acara.'},
                  {name:'Buat Contoh Sendiri', detail:'Rancanglah pembagian 4 tugas spesifik untuk persiapan "Pentas Seni Kelas" kelompok kalian.', tips:'Bagi tugas besarnya menjadi 4 peran kecil yang spesifik (misal: bagian musik, latihan, dekor panggung, dokumentasi).'},
                  {name:'Manfaat Sehari-hari', detail:'Pekerjaan yang terlihat berat menjadi ringan, dan mudah dibagikan kepada anggota tim secara adil.'}
              ]},
            { id: 2, pillarId: 'dekomposisi', title: 'Membangun Taman Sekolah',
              slides: [
                  {name:'Pembahasan Pilar', detail:'Jelaskan konsep Dekomposisi: Memecah proyek kompleks agar tidak membingungkan saat dimulai.'},
                  {name:'Contoh Kehidupan Nyata', detail:'Membangun taman dipecah menjadi: Menyiapkan tanah, membeli bibit, menanam, dan membuat jadwal siram.'},
                  {name:'Buat Contoh Sendiri', detail:'Rancanglah langkah-langkah dekomposisi untuk tugas "Membuat Mading Kelas yang Menarik".', tips:'Pikirkan 4 tahapan kecil berurutan, mulai dari mencari ide tema, menyiapkan bahan/kertas, menggambar/menulis konten, hingga menempelkannya.'},
                  {name:'Manfaat Sehari-hari', detail:'Fokus kita tidak terpecah, bisa menyelesaikan satu per satu bagian hingga proyek besar selesai.'}
              ]},
            { id: 3, pillarId: 'dekomposisi', title: 'Persiapan Bazaar Sekolah',
              slides: [
                  {name:'Pembahasan Pilar', detail:'Jelaskan konsep Dekomposisi: Teknik menganalisis sistem yang besar menjadi sub-sistem terkecil.'},
                  {name:'Contoh Kehidupan Nyata', detail:'Mengurus stan bazaar dengan membaginya: Menentukan produk jualan, menetapkan harga, dan promosi.'},
                  {name:'Buat Contoh Sendiri', detail:'Buatlah dekomposisi pembagian tugas harian membersihkan kelas (piket) yang adil untuk 5 orang.', tips:'Bagi area atau jenis pekerjaan piketnya (misal: menyapu, mengepel, menghapus papan, merapikan meja, dan membuang sampah).'},
                  {name:'Manfaat Sehari-hari', detail:'Mengurangi rasa stres saat menghadapi ujian/tugas berat karena kita tahu dari mana harus mulai.'}
              ]},
            { id: 4, pillarId: 'dekomposisi', title: 'Aplikasi Perpustakaan',
              slides: [
                  {name:'Pembahasan Pilar', detail:'Jelaskan konsep Dekomposisi: Bagaimana programmer memecah kode aplikasi menjadi modul-modul kecil.'},
                  {name:'Contoh Kehidupan Nyata', detail:'Memecah fitur aplikasi perpus: Fitur Login, Fitur Cari Buku, dan Fitur Peminjaman.'},
                  {name:'Buat Contoh Sendiri', detail:'Rancanglah pecahan 3 fitur utama jika kalian ditugaskan membuat "Aplikasi Kantin Online Sekolah".', tips:'Bayangkan halaman apa saja yang wajib ada (misal: Menu Makanan, Keranjang Belanja, dan Halaman Pembayaran).'},

                  {name:'Manfaat Sehari-hari', detail:'Membuat teknologi canggih dapat digunakan oleh siapa saja, bahkan oleh anak kecil sekalipun.'}

              slides: [

            // --- ALGORITMA ---

              slides: [

            { id: 14, pillarId: 'algoritma', title: 'Sistem Antri di Kantin',
              slides: [

              slides: [

                  {name:'Manfaat Sehari-hari', detail:'Pekerjaan yang berulang-ulang bisa dilakukan dengan sangat cepat seperti robot.'}
              ]},
            { id: 16, pillarId: 'algoritma', title: 'Mencari Buku Spesifik',
              slides: [
                  {name:'Pembahasan Pilar', detail:'Jelaskan konsep Desain Algoritma: Cara paling cerdas dan efisien untuk menemukan sesuatu dalam tumpukan data.'},
                  {name:'Contoh Kehidupan Nyata', detail:'Mencari kata di kamus: Buka bagian tengah, cek abjadnya, buang setengah bagian yang salah, ulangi.'},
                  {name:'Buat Contoh Sendiri', detail:'Buatlah algoritma tercepat untuk menemukan kemeja seragam tertentu di dalam lemari pakaian yang berantakan.', tips:'Daripada membongkar seluruh isi lemari, pikirkan langkah mencari spesifik di laci/tumpukan khusus pakaian sekolah saja terlebih dahulu.'},
                  {name:'Manfaat Sehari-hari', detail:'Tidak membuang waktu mencari sesuatu secara acak, semuanya diselesaikan dengan logika matematis.'}
              ]}
        ];

        let availableTopics = [...allTopics];
        let playerName = '';
        let currentRoundPillars = [];
        let S = { busy:false };

        function init() {
            makeParticles();
            const inp = document.getElementById('name-input');
            inp.addEventListener('keydown', e => { if(e.key==='Enter') submitName(); });
            inp.addEventListener('input', function() {
                document.getElementById('name-error').textContent = '';
                this.style.borderColor = '';
            });
            setTimeout(() => inp.focus(), 500);
        }

        function makeParticles() {
            const c = document.getElementById('bg-particles');
            let h = '';
            for(let i=0;i<16;i++){
                const sz=Math.random()*4+2,x=Math.random()*100,y=Math.random()*100;
                const dur=Math.random()*6+5,del=Math.random()*5;
                const col=Math.random()>.5?'rgba(232,168,56,0.13)':'rgba(196,120,74,0.1)';
                h+=`<div class="bg-p" style="width:${sz}px;height:${sz}px;left:${x}%;top:${y}%;background:${col};--d:${dur}s;--dl:${del}s"></div>`;
            }
            c.innerHTML=h;
        }

        function submitName() {
            const inp = document.getElementById('name-input');
            const err = document.getElementById('name-error');
            const val = inp.value.trim();

            if(!val) {
                err.textContent = 'Silakan masukkan nama kelompok/siswa!';
                inp.style.borderColor = '#e8694a';
                inp.focus();
                return;
            }

            err.textContent = '';
            inp.style.borderColor = '';
            playerName = val;
            startGame();
        }

        function startGame() {
            S.busy = true;
            document.getElementById('display-name').textContent = playerName;
            updateCounterDisplay();
            
            const pillarKeys = Object.keys(pillarDefs);
            currentRoundPillars = pillarKeys.sort(() => 0.5 - Math.random()).map(k => pillarDefs[k]);
            
            renderBowls();
            switchTo('game-screen');

            document.getElementById('hint-text').innerHTML = '<i class="fa-solid fa-shuffle" style="margin-right:.3rem;color:var(--gold)"></i> Mengacak posisi pilar...';
            
            const slots = document.querySelectorAll('.bowl-slot');
            slots.forEach(s => s.classList.add('shuffling'));

            setTimeout(() => {
                slots.forEach(s => s.classList.remove('shuffling'));
                document.getElementById('hint-text').innerHTML = '<i class="fa-solid fa-arrow-pointer" style="margin-right:.3rem"></i> Klik salah satu mangkok untuk mengungkap isinya';
                S.busy = false; 
            }, 1200);
        }

        function renderBowls() {
            const row = document.getElementById('bowls-row');
            row.innerHTML = currentRoundPillars.map((p, i) => `
                <div class="bowl-slot" id="bs${i}">
                    <div class="bowl-content-area" id="bc${i}">
                        <div class="token-glow" style="--tk-color: ${p.color}">
                            <i class="fa-solid ${p.icon}"></i>
                        </div>
                    </div>
                    <div class="bowl-assembly" id="ba${i}" onclick="clickBowl(${i})" role="button" aria-label="Pilih mangkok ${i+1}" tabindex="0">
                        <div class="bowl-body"></div>
                        <div class="bowl-rim"></div>
                    </div>
                    <div class="bowl-label">
                        <i class="fa-solid fa-circle-question" style="color:var(--gold)"></i>
                        <span class="ltxt">Mangkok ${i+1}</span>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.bowl-assembly').forEach(el => {
                el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();el.click()} });
            });
        }

        function clickBowl(i) {
            if(S.busy) return;
            S.busy = true;

            const slot = document.getElementById(`bs${i}`);
            if(slot.classList.contains('shuffling') || slot.classList.contains('revealed')) return;

            document.querySelectorAll('.bowl-slot').forEach((el, idx) => {
                if(idx !== i) el.classList.add('dimmed');
            });

            slot.classList.add('lifted', 'revealed');
            document.getElementById(`ba${i}`).classList.add('locked');
            document.getElementById('hint-text').innerHTML = '<i class="fa-solid fa-star" style="color:var(--gold);margin-right:.3rem"></i> Pilar ditemukan!';

            const revealedPillarDef = currentRoundPillars[i];
            
            let topicIndex = availableTopics.findIndex(t => t.pillarId === Object.keys(pillarDefs).find(key => pillarDefs[key].name === revealedPillarDef.name));
            
            if (topicIndex === -1) {
                availableTopics = [...allTopics]; 
                toast('Bank soal habis! Semua topik direset ulang (16/16).', '#4ac47a');
                topicIndex = availableTopics.findIndex(t => t.pillarId === Object.keys(pillarDefs).find(key => pillarDefs[key].name === revealedPillarDef.name));
            }

            const chosenTopic = availableTopics.splice(topicIndex, 1)[0];
            updateCounterDisplay();

            setTimeout(() => {
                confetti(revealedPillarDef.color);
                setTimeout(() => { 
                    showBriefing(chosenTopic, revealedPillarDef); 
                    S.busy = false; 
                }, 1300);
            }, 600);
        }

        function updateCounterDisplay() {
            document.getElementById('topic-counter').textContent = `${availableTopics.length}/16`;
        }

        function showBriefing(topic, pillarDef) {
            document.getElementById('r-player').innerHTML = `<i class="fa-solid fa-users" style="font-size:.75rem"></i> Kelompok: <strong>${playerName}</strong>`;
            
            document.getElementById('r-badge').innerHTML = `<i class="fa-solid ${pillarDef.icon}"></i> ${pillarDef.name}`;
            document.getElementById('r-badge').style.cssText = `background:${pillarDef.color}15;color:${pillarDef.color};border:1px solid ${pillarDef.color}40`;
            
            document.getElementById('r-title').textContent = topic.title;
            document.getElementById('r-title').style.color = pillarDef.color;
            
            document.getElementById('r-subtitle').textContent = "Tema Presentasi Kelompokmu";
            
            // Render slides dan masukan Tips jika ada
            document.getElementById('slides-outline').innerHTML = topic.slides.map((s, idx) => {
                let tipHtml = '';
                if(s.tips) {
                    tipHtml = `<div class="slide-tip">
                                  <i class="fa-regular fa-lightbulb"></i> 
                                  <span><strong>Tips:</strong> ${s.tips}</span>
                               </div>`;
                }
                
                return `
                <div class="slide-item">
                    <div class="slide-item-header">
                        <div class="slide-num" style="background:${pillarDef.color}">${idx+1}</div>
                        <div class="slide-info">
                            <div class="slide-name">${s.name}</div>
                            <div class="slide-detail">${s.detail}</div>
                        </div>
                    </div>
                    ${tipHtml}
                </div>
                `;
            }).join('');
            
            document.getElementById('result-card').style.borderTop = `4px solid ${pillarDef.color}`;
            document.getElementById('result-overlay').classList.add('active');
        }

        function nextStudent() {
            document.getElementById('result-overlay').classList.remove('active');
            const inp = document.getElementById('name-input');
            inp.value = '';
            playerName = '';
            
            setTimeout(() => {
                switchTo('name-screen');
                setTimeout(() => inp.focus(), 400);
            }, 400);
        }

        function switchTo(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            setTimeout(() => document.getElementById(id).classList.remove('hidden'), 80);
        }

        function toast(msg, col) {
            const t = document.getElementById('toast');
            t.textContent = msg; t.style.borderLeft = `4px solid ${col||'var(--gold)'}`;
            t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000);
        }

        function confetti(pillarColor) {
            const cols = [pillarColor, pillarColor, '#f5efe6', '#e8a838']; 
            for(let i=0;i<65;i++){
                const el = document.createElement('div'); el.className = 'confetti-piece';
                const sz = Math.random()*7+5, x = Math.random()*100;
                const c = cols[Math.floor(Math.random()*cols.length)];
                const dur = Math.random()*2+1.5, del = Math.random()*.4;
                const rot = Math.random()*1080-540, drift = (Math.random()-.5)*250;
                const br = Math.random()>.4 ? '50%' : '3px';
                
                el.style.cssText = `left:${x}%;width:${sz}px;height:${sz*.7}px;background:${c};border-radius:${br};box-shadow:0 0 5px ${c}80`;
                el.animate([
                    {transform:'translateX(0) translateY(-20px) rotate(0deg) scale(1)',opacity:1},
                    {transform:`translateX(${drift}px) translateY(100vh) rotate(${rot}deg) scale(.5)`,opacity:0}
                ],{duration:dur*1000,delay:del*1000,easing:'cubic-bezier(.25,.46,.45,.94)',fill:'forwards'});
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), (dur+del)*1000+50);
            }
        }

        init();
    </script>
